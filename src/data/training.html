<h1>Employee Training Policy</h1>

<h2>Mandatory Training</h2>
<p>All employees must complete onboarding training within 30 days.</p>

<h2>Annual Training</h2>
<p>Security and compliance training must be completed annually.</p>

<h2>Failure to Complete</h2>
<p>Failure to complete required training may result in suspension of system access.</p>
