<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Policy RAG Assistant</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    background: #020617;
    border-bottom: 1px solid #1e293b;
}

#chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* Chat bubbles */
.message {
    margin-bottom: 15px;
    display: flex;
}

.user {
    justify-content: flex-end;
}

.ai {
    justify-content: flex-start;
}

.bubble {
    max-width: 70%;
    padding: 12px;
    border-radius: 10px;
    line-height: 1.4;
}

.user .bubble {
    background: #3b82f6;
    color: white;
}

.ai .bubble {
    background: #1e293b;
}

/* Citations */
.citation {
    font-size: 0.8em;
    background: #020617;
    padding: 8px;
    margin-top: 8px;
    border-left: 3px solid #38bdf8;
    border-radius: 5px;
}

/* Input bar */
.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #1e293b;
    background: #020617;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: #1e293b;
    color: white;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* Loading */
.loading {
    font-style: italic;
    color: #94a3b8;
}

/* Latency */
.latency {
    font-size: 0.75em;
    color: #64748b;
    margin-top: 5px;
}
</style>
</head>

<body>
<div class="container">

<header>
📚 Apex Motors Policy Assistant (RAG)
</header>

<div id="chat-container"></div>

<div class="input-area">
    <input type="text" id="query" placeholder="Ask about PTO, expenses, policies..." />
    <button onclick="ask()">Ask</button>
</div>

</div>

<script>
// Escape user input (security)
function escapeHTML(str) {
    return str.replace(/[&<>"']/g, function(tag) {
        const chars = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        };
        return chars[tag] || tag;
    });
}

// Optional welcome message
const container = document.getElementById('chat-container');
container.innerHTML = `
    <div class="message ai">
        <div class="bubble">
            👋 Ask me anything about company policies (PTO, expenses, security...)
        </div>
    </div>
`;

async function ask() {
    const input = document.getElementById('query');
    const query = input.value.trim();
    if (!query) return;

    // User message
    container.innerHTML += `
        <div class="message user">
            <div class="bubble">${escapeHTML(query)}</div>
        </div>
    `;

    input.value = "";

    // Loading indicator
    const loadingId = "loading-" + Date.now();
    container.innerHTML += `
        <div class="message ai" id="${loadingId}">
            <div class="bubble loading">Thinking...</div>
        </div>
    `;

    container.scrollTop = container.scrollHeight;

    let data;

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({query: query})
        });

        data = await response.json();
    } catch (error) {
        document.getElementById(loadingId).remove();

        container.innerHTML += `
            <div class="message ai">
                <div class="bubble">⚠️ Error connecting to server.</div>
            </div>
        `;
        return;
    }

    // Remove loading
    document.getElementById(loadingId).remove();

    // Format citations
    let citations = data.citations.map(c => `
        <div class="citation">
            <strong>${c.source}</strong><br>
            ${c.snippet}...
        </div>
    `).join('');

    // AI response
    container.innerHTML += `
        <div class="message ai">
            <div class="bubble">
                ${data.answer}
                ${citations}
                <div class="latency">⏱ ${data.latency.toFixed(2)}s</div>
            </div>
        </div>
    `;

    container.scrollTop = container.scrollHeight;
}

// Enter key support (fixed)
document.getElementById("query").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        ask();
    }
});
</script>

</body>
</html>
