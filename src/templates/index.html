<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy RAG Assistant</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            background: #020617;
            border-bottom: 1px solid #1e293b;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
        }

        .user {
            justify-content: flex-end;
        }

        .ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 12px;
            border-radius: 10px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .bubble {
            background: #3b82f6;
            color: white;
        }

        .ai .bubble {
            background: #1e293b;
            border: 1px solid #334155;
        }

        .citation {
            font-size: 0.85em;
            background: #020617;
            padding: 10px;
            margin-top: 10px;
            border-left: 3px solid #38bdf8;
            border-radius: 4px;
            color: #94a3b8;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #1e293b;
            background: #020617;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            outline: none;
            background: #1e293b;
            color: white;
            font-size: 16px;
        }

        button {
            margin-left: 10px;
            padding: 0 25px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        .loading-text {
            font-style: italic;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        📚 Apex Motors Policy Assistant
    </header>

    <div id="chat-container">
        <div class="message ai">
            <div class="bubble">
                👋 Ask me anything about company policies (PTO, expenses, security...)
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="query" placeholder="Type your question here..." autocomplete="off">
        <button id="sendBtn">Ask</button>
    </div>
</div>

<script>
    const container = document.getElementById('chat-container');
    const queryInput = document.getElementById('query');
    const sendBtn = document.getElementById('sendBtn');

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[m]));
    }

    async function ask() {
        const query = queryInput.value.trim();
        if (!query) return;

        // 1. Clear input and add User bubble
        queryInput.value = "";
        container.innerHTML += `
            <div class="message user">
                <div class="bubble">${escapeHTML(query)}</div>
            </div>
        `;

        // 2. Placeholder AI bubble
        const aiMessageId = "ai-" + Date.now();
        container.innerHTML += `
            <div class="message ai" id="${aiMessageId}">
                <div class="bubble">
                    <span class="content"><span class="loading-text">Thinking...</span></span>
                    <div class="citations-area"></div>
                </div>
            </div>
        `;
        container.scrollTop = container.scrollHeight;

        const contentSpan = document.getElementById(aiMessageId).querySelector('.content');
        const citationsArea = document.getElementById(aiMessageId).querySelector('.citations-area');

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });

            if (!response.ok) throw new Error("Server disconnected");

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            let fullAnswer = "";
            let hasStarted = false;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                // Process newline-delimited JSON chunks
                let lines = buffer.split("\n");
                buffer = lines.pop(); // keep incomplete line

                for (const line of lines) {
                    if (!line.trim()) continue;

                    try {
                        const chunk = JSON.parse(line);

                        // Handle citations (only in first chunk)
                        if (chunk.citations) {
                            citationsArea.innerHTML = chunk.citations.map(c => `
                                <div class="citation">
                                    <strong>Source: ${escapeHTML(c.source)}</strong><br>
                                    "${escapeHTML(c.snippet)}..."
                                </div>
                            `).join('');
                        }

                        // Handle content streaming
                        if (chunk.content) {
                            if (!hasStarted) {
                                contentSpan.innerHTML = ""; // remove "Thinking..."
                                hasStarted = true;
                            }
                            fullAnswer += chunk.content;
                            contentSpan.innerText = fullAnswer;
                            container.scrollTop = container.scrollHeight;
                        }

                    } catch (err) {
                        console.error("JSON parse error", err, line);
                    }
                }
            }

        } catch (error) {
            contentSpan.innerHTML = "<span style='color: #f87171;'>⚠️ Error: Could not reach the policy engine.</span>";
            console.error(error);
        }
    }

    sendBtn.addEventListener('click', ask);
    queryInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') ask();
    });
</script>

</body>
</html>
