name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/corpus_llm_rag:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/corpus_llm_rag:latest

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script_stop: true
          script: |
            # Ensure the host directory exists
            mkdir -p /home/uche/chroma_data

            # 2. Pull and Restart
            if docker pull ${{ secrets.DOCKER_USERNAME }}/corpus_llm_rag:latest; then
                echo "Pull successful, swapping containers..."
                docker stop corpus_llm_rag || true
                docker rm corpus_llm_rag || true
                
                # Updated command with Persistent Volume Mapping
                docker run -d --name corpus_llm_rag \
                  --user 1000:1000 \
                  -p 1762:1762 \
                  -v /home/uche/chroma_data:/app/src/chroma_db \
                  -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
                  ${{ secrets.DOCKER_USERNAME }}/corpus_llm_rag:latest

                # Clean up the OLD image now that the new one is running
                docker image prune -f
                
            else
                echo "Pull failed!"
                exit 1
            fi